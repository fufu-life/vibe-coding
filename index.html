<!doctype html>
<html lang="zh-CN">
  <head>
    <!-- Google tag (gtag.js) -->

      window.addEventListener('load', () => {
        const analyticsScript = document.createElement('script');
        analyticsScript.async = true;
        analyticsScript.src = 'https://www.googletagmanager.com/gtag/js?id=G-E49LJ5T1V6';

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>阿浮的音乐剧歌词集</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #120f0b;
        --wood: #2b1a10;
        --wood-deep: #160d08;
        --ink: #fbf4e6;
        --muted: rgba(251, 244, 230, 0.66);
        --line: rgba(238, 206, 145, 0.22);
        --gold: #d8b15b;
        --shadow: rgba(0, 0, 0, 0.38);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px) 0 0 / 72px 72px,
          linear-gradient(180deg, #1b130d 0%, #0d0a08 58%, #090706 100%);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(115deg, rgba(216, 177, 91, 0.13), transparent 30%),
          linear-gradient(245deg, rgba(122, 32, 39, 0.16), transparent 34%);
      }

      main {
        position: relative;
        width: min(1320px, calc(100% - 32px));
        margin: 0 auto;
        padding: 52px 0 64px;
      }

      .library-head {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 28px;
        align-items: end;
        padding-bottom: 32px;
      }

      h1 {
        margin: 0;
        color: var(--gold);
        font-family: "Songti SC", "Noto Serif CJK SC", "STSong", serif;
        font-size: clamp(2.1rem, 5vw, 4.2rem);
        font-weight: 700;
        line-height: 1.05;
        letter-spacing: 0;
      }

      .intro {
        max-width: 860px;
        margin: 16px 0 0;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.8;
      }

      .no-break {
        white-space: nowrap;
      }

      .counter {
        display: grid;
        justify-items: end;
        gap: 4px;
        color: rgba(251, 244, 230, 0.72);
        font-family: "Songti SC", "Noto Serif CJK SC", serif;
      }

      .counter strong {
        color: var(--ink);
        font-size: 2.4rem;
        line-height: 1;
      }

      .display-case {
        position: relative;
        padding: 22px 20px 30px;
        border: 1px solid rgba(216, 177, 91, 0.2);
        border-radius: 8px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.065), rgba(255, 255, 255, 0.02)),
          linear-gradient(90deg, rgba(255, 255, 255, 0.04), transparent 20%, transparent 80%, rgba(255, 255, 255, 0.035)),
          var(--wood-deep);
        box-shadow: 0 24px 70px var(--shadow);
      }

      .language-groups {
        display: grid;
        gap: 34px;
      }

      .language-group {
        display: grid;
        gap: 14px;
      }

      .language-heading {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 18px;
        padding: 0 4px;
      }

      .language-heading h2 {
        margin: 0;
        color: var(--ink);
        font-family: "Songti SC", "Noto Serif CJK SC", "STSong", serif;
        font-size: 1.42rem;
        font-weight: 650;
        letter-spacing: 0;
      }

      .language-heading span {
        color: var(--muted);
        font-size: 0.82rem;
      }

      .display-case::after {
        content: "";
        position: absolute;
        left: 16px;
        right: 16px;
        bottom: 14px;
        height: 14px;
        border-radius: 4px;
        background:
          linear-gradient(180deg, rgba(255, 232, 181, 0.2), rgba(0, 0, 0, 0.22)),
          linear-gradient(90deg, #28160c, #5a351d 44%, #2b190e);
        box-shadow: 0 9px 22px rgba(0, 0, 0, 0.42);
      }

      .collection {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-columns: repeat(auto-fill, 180px);
        gap: 14px;
        align-items: stretch;
        justify-content: start;
      }

      .show-card {
        --accent: #d8b15b;
        --accent-soft: rgba(216, 177, 91, 0.16);
        display: grid;
        position: relative;
        grid-template-rows: auto 1fr;
        width: 180px;
        height: 300px;
        padding: 10px;
        border: 1px solid color-mix(in srgb, var(--accent), transparent 58%);
        border-radius: 6px;
        color: inherit;
        text-decoration: none;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.025)),
          linear-gradient(145deg, var(--accent-soft), rgba(0, 0, 0, 0.2));
        box-shadow: 0 14px 28px rgba(0, 0, 0, 0.24);
        transform-origin: bottom center;
        transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
      }

      .show-card::before {
        content: "";
        position: absolute;
        top: 5px;
        left: 50%;
        width: 34px;
        height: 3px;
        border-radius: 2px;
        background: rgba(255, 255, 255, 0.16);
        transform: translateX(-50%);
      }

      .show-card:hover,
      .show-card:focus-visible {
        transform: translateY(-4px);
        border-color: color-mix(in srgb, var(--accent), white 10%);
        box-shadow: 0 24px 48px rgba(0, 0, 0, 0.34);
        outline: none;
      }

      .show-card.rouge {
        --accent: #bf2437;
        --accent-soft: rgba(191, 36, 55, 0.18);
        --cover-deep: #e9e2d8;
        --cover-bright: #fffaf2;
      }

      .show-card.hamilton {
        --accent: #d4af37;
        --accent-soft: rgba(212, 175, 55, 0.17);
      }

      .show-card.dzw {
        --accent: #d7c7a1;
        --accent-soft: rgba(6, 69, 61, 0.58);
        --cover-deep: #032f2a;
        --cover-bright: #06453d;
      }

      .show-card.ndp {
        --accent: #c43b23;
        --accent-soft: rgba(196, 59, 35, 0.18);
        --cover-deep: #11100f;
        --cover-bright: #3a3027;
      }

      .show-card.lesmis {
        --accent: #e09f3e;
        --accent-soft: rgba(158, 42, 43, 0.24);
        --cover-deep: #080605;
        --cover-bright: #2b1514;
      }

      .show-card.mozart {
        --accent: #00f5d4;
        --accent-soft: rgba(230, 57, 70, 0.2);
        --cover-deep: #060103;
        --cover-bright: #35111f;
      }

      .show-card.romeo {
        --accent: #b91c1c;
        --accent-soft: rgba(30, 64, 175, 0.22);
        --cover-deep: #07070a;
        --cover-bright: #14285d;
      }

      .show-card.soleil {
        --accent: #ffd700;
        --accent-soft: rgba(26, 54, 93, 0.28);
        --cover-deep: #100c04;
        --cover-bright: #3b2a08;
      }

      .show-card.bastille {
        --accent: #b72e38;
        --accent-soft: rgba(183, 46, 56, 0.24);
        --cover-deep: #130608;
        --cover-bright: #471018;
      }

      .show-card.donjuan {
        --accent: #e0a96d;
        --accent-soft: rgba(122, 0, 16, 0.28);
        --cover-deep: #0e0202;
        --cover-bright: #3b070b;
      }

      .show-card.moliere {
        --accent: #e7762e;
        --accent-soft: rgba(231, 118, 46, 0.24);
        --cover-deep: #061b4f;
        --cover-bright: #0d2d75;
      }

      .show-card.cyrano {
        --accent: #b85a65;
        --accent-soft: rgba(111, 33, 45, 0.28);
        --cover-deep: #110709;
        --cover-bright: #3c1219;
      }

      .show-card.chicago {
        --accent: #c51f2b;
        --accent-soft: rgba(197, 31, 43, 0.24);
        --cover-deep: #090708;
        --cover-bright: #2c1115;
      }

      .show-card.dear-evan-hansen {
        --accent: #70b7ca;
        --accent-soft: rgba(42, 122, 170, 0.22);
        --cover-deep: #07141b;
        --cover-bright: #163d50;
      }

      .show-card.six-the-musical {
        --accent: #d52ba6;
        --accent-soft: rgba(213, 43, 166, 0.25);
        --cover-deep: #10051c;
        --cover-bright: #40205f;
      }

      .show-card.suffs {
        --accent: #e3ba25;
        --accent-soft: rgba(227, 186, 37, 0.22);
        --cover-deep: #1d1527;
        --cover-bright: #6d4a87;
      }

      .show-card.sunset-boulevard {
        --accent: #d78024;
        --accent-soft: rgba(215, 128, 36, 0.22);
        --cover-deep: #070707;
        --cover-bright: #3b2111;
      }

      .cover {
        display: grid;
        place-items: center;
        aspect-ratio: 4 / 5;
        min-height: 0;
        border: 1px solid rgba(255, 255, 255, 0.13);
        border-radius: 6px;
        overflow: hidden;
        background:
          linear-gradient(155deg, rgba(255, 255, 255, 0.13), transparent 28%),
          linear-gradient(180deg, rgba(0, 0, 0, 0.08), rgba(0, 0, 0, 0.34)),
          var(--accent-soft);
      }

      .show-card.dzw .cover {
        background:
          linear-gradient(155deg, rgba(215, 199, 161, 0.16), transparent 30%),
          repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.022) 0 1px, transparent 1px 18px),
          linear-gradient(180deg, var(--cover-bright), var(--cover-deep));
      }

      .show-card.rouge .cover,
      .show-card.ndp .cover,
      .show-card.lesmis .cover,
      .show-card.mozart .cover,
      .show-card.romeo .cover,
      .show-card.soleil .cover,
      .show-card.bastille .cover,
      .show-card.donjuan .cover,
      .show-card.moliere .cover,
      .show-card.cyrano .cover {
        background:
          radial-gradient(circle at 50% 18%, color-mix(in srgb, var(--accent), transparent 60%), transparent 34%),
          linear-gradient(155deg, rgba(255, 255, 255, 0.13), transparent 30%),
          repeating-linear-gradient(135deg, rgba(255, 255, 255, 0.026) 0 1px, transparent 1px 16px),
          linear-gradient(180deg, var(--cover-bright), var(--cover-deep));
      }

      .show-card.chicago .cover,
      .show-card.dear-evan-hansen .cover,
      .show-card.six-the-musical .cover,
      .show-card.suffs .cover,
      .show-card.sunset-boulevard .cover {
        background:
          radial-gradient(circle at 50% 18%, color-mix(in srgb, var(--accent), transparent 60%), transparent 34%),
          linear-gradient(155deg, rgba(255, 255, 255, 0.13), transparent 30%),
          repeating-linear-gradient(135deg, rgba(255, 255, 255, 0.026) 0 1px, transparent 1px 16px),
          linear-gradient(180deg, var(--cover-bright), var(--cover-deep));
      }

      .show-card.dzw .cover-title span,
      .show-card.dzw .show-meta {
        text-transform: none;
      }

      .cover-title {
        display: grid;
        gap: 6px;
        justify-items: center;
        padding: 12px;
        text-align: center;
        font-family: "Songti SC", "Noto Serif CJK SC", serif;
      }

      .cover-title strong {
        font-size: 1.32rem;
        line-height: 1.08;
        letter-spacing: 0;
      }

      .cover-title span {
        color: rgba(251, 244, 230, 0.72);
        font-size: 0.67rem;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .show-logo {
        width: min(86%, 260px);
        max-height: 82%;
        object-fit: contain;
        filter: drop-shadow(0 12px 24px rgba(0, 0, 0, 0.34));
      }

      .show-card.dzw .show-logo {
        width: 84%;
        max-height: 80%;
        transform: translateY(-6px);
      }

      .show-card.rouge .show-logo {
        width: 92%;
        max-height: 88%;
      }

      .show-copy {
        display: grid;
        align-content: end;
        gap: 7px;
        padding: 11px 2px 2px;
      }

      .show-copy strong {
        color: var(--ink);
        font-family: "Songti SC", "Noto Serif CJK SC", serif;
        font-size: 1rem;
        line-height: 1.25;
        letter-spacing: 0;
      }

      .show-meta {
        color: color-mix(in srgb, var(--accent), white 24%);
        font-size: 0.67rem;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      @media (max-width: 860px) {
        main {
          width: min(100% - 24px, 620px);
          padding: 36px 0 46px;
        }

        .library-head {
          grid-template-columns: 1fr;
          gap: 18px;
        }

        .counter {
          justify-items: start;
        }

        .language-groups {
          gap: 28px;
        }
      }

      @media (max-width: 320px) {
        .display-case {
          padding-inline: 12px;
        }

      }

      @media (prefers-reduced-motion: reduce) {
        .show-card {
          transition: none;
        }

        .show-card:hover,
        .show-card:focus-visible {
          transform: none;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header class="library-head">
        <div>
          <h1>阿浮的音乐剧歌词集</h1>
          <p class="intro">感谢剧场让我们的轨迹短暂交叠，行走在志同道合的路上，愿我们一直望着<span class="no-break">同一个月亮。</span></p>
        </div>
        <div class="counter" aria-label="当前收录剧目数量">
          <strong id="showCount">0</strong>
          <span>shows on shelf</span>
        </div>
      </header>

      <div class="language-groups" id="languageGroups" aria-live="polite"></div>
    </main>
    <script>
      (() => {
        const retryKey = `musical-site-retry:${window.location.pathname}`;
        let reloadStarted = false;

        function showLoadError() {
          const render = () => {
            if (document.querySelector("#criticalLoadError")) return;

            const notice = document.createElement("aside");
            notice.id = "criticalLoadError";
            notice.setAttribute("role", "status");
            notice.setAttribute("aria-live", "assertive");
            notice.style.cssText = "position:fixed;left:50%;bottom:18px;z-index:100000;width:min(420px,calc(100% - 28px));padding:14px 16px;border:1px solid rgba(255,255,255,.22);border-radius:8px;color:#fff;background:rgba(20,16,14,.96);box-shadow:0 18px 48px rgba(0,0,0,.42);font:14px/1.6 system-ui,-apple-system,sans-serif;transform:translateX(-50%)";

            const message = document.createElement("span");
            message.textContent = "网络连接不稳定，页面资源未完整加载。请稍后重试，或切换网络。";

            const retry = document.createElement("button");
            retry.type = "button";
            retry.textContent = "重新加载";
            retry.style.cssText = "margin-left:12px;padding:6px 10px;border:1px solid rgba(255,255,255,.35);border-radius:6px;color:#fff;background:transparent;font:inherit;cursor:pointer";
            retry.addEventListener("click", () => {
              try {
                sessionStorage.removeItem(retryKey);
              } catch {}
              window.location.reload();
            });

            notice.append(message, retry);
            document.body.append(notice);
          };

          if (document.body) render();
          else document.addEventListener("DOMContentLoaded", render, { once: true });
        }

        window.handleCriticalAssetError = () => {
          if (reloadStarted) return;

          let canRememberRetry = true;
          let recentlyRetried = false;
          const now = Date.now();

          try {
            const lastRetry = Number(sessionStorage.getItem(retryKey) || 0);
            recentlyRetried = now - lastRetry < 30000;
            if (!recentlyRetried) sessionStorage.setItem(retryKey, String(now));
          } catch {
            canRememberRetry = false;
          }

          if (canRememberRetry && !recentlyRetried) {
            reloadStarted = true;
            const retryUrl = new URL(window.location.href);
            retryUrl.searchParams.set("_retry", String(now));
            window.location.replace(retryUrl);
            return;
          }

          showLoadError();
        };

        window.addEventListener("load", () => {
          window.setTimeout(() => {
            try {
              sessionStorage.removeItem(retryKey);
              const cleanUrl = new URL(window.location.href);
              if (cleanUrl.searchParams.delete("_retry")) {
                history.replaceState(null, "", cleanUrl);
              }
            } catch {}
          }, 3000);
        }, { once: true });
      })();
    </script>
    <script src="shows.js" onerror="handleCriticalAssetError()"></script>
    <script src="library.js" onerror="handleCriticalAssetError()"></script>
  </body>
</html>
