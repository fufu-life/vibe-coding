<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vibe-coding</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #15110a;
        --panel: #21190e;
        --line: rgba(237, 214, 153, 0.28);
        --ink: #fff7df;
        --muted: #cbb985;
        --gold: #f2d88d;
      }
      * { box-sizing: border-box; }
      body {
        min-height: 100vh;
        margin: 0;
        background:
          linear-gradient(120deg, rgba(0, 0, 0, 0.42), transparent 42%),
          var(--bg);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
      }
      main {
        width: min(920px, calc(100% - 36px));
        margin: 0 auto;
        padding: 72px 0;
      }
      h1 {
        margin: 0 0 10px;
        font-size: clamp(2rem, 6vw, 4.5rem);
        letter-spacing: 0.02em;
      }
      .intro {
        margin: 0 0 32px;
        color: var(--muted);
        font-size: 1.05rem;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 14px;
      }
      a.card {
        display: block;
        min-height: 130px;
        padding: 22px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.035);
        color: inherit;
        text-decoration: none;
      }
      a.card:hover { border-color: rgba(242, 216, 141, 0.7); }
      .card strong {
        display: block;
        margin-bottom: 10px;
        color: var(--gold);
        font-size: 1.45rem;
      }
      .card span {
        color: var(--muted);
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>vibe-coding</h1>
      <p class="intro">本地音乐剧歌词学习页面合集。</p>
      <section class="grid" aria-label="页面列表">
        <a class="card" href="./dazhuangwang/">
          <strong>大状王</strong>
          <span>粤语歌词、粤拼对照与词汇释义。</span>
        </a>
      </section>
    </main>
  </body>
</html>
