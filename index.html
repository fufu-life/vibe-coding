<!doctype html>
<html lang="zh-CN">
  <head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-E49LJ5T1V6"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-E49LJ5T1V6');

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>音乐剧歌词合集</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #14100b;
        --panel: rgba(255, 255, 255, 0.055);
        --line: rgba(235, 205, 140, 0.22);
        --text: #f6efe0;
        --muted: rgba(246, 239, 224, 0.66);
        --accent: #d7b464;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 16% 12%, rgba(215, 180, 100, 0.16), transparent 28%),
          linear-gradient(135deg, #120d08, #21180f 46%, #100c08);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(960px, calc(100% - 32px));
        margin: 0 auto;
        padding: 56px 0;
      }

      h1 {
        margin: 0;
        color: var(--accent);
        font-family: "Songti SC", "Noto Serif CJK SC", serif;
        font-size: clamp(2.2rem, 7vw, 4.8rem);
        line-height: 1.05;
        letter-spacing: 0.08em;
      }

      .intro {
        margin: 18px 0 34px;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.8;
      }

      .collection {
        display: grid;
        gap: 14px;
      }

      .card {
        display: grid;
        gap: 8px;
        padding: 22px;
        border: 1px solid var(--line);
        border-radius: 10px;
        color: inherit;
        background: var(--panel);
        text-decoration: none;
        transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
      }

      .card:hover,
      .card:focus-visible {
        transform: translateY(-2px);
        border-color: rgba(215, 180, 100, 0.58);
        background: rgba(255, 255, 255, 0.08);
        outline: none;
      }

      .card strong {
        font-family: "Songti SC", "Noto Serif CJK SC", serif;
        font-size: 1.35rem;
        letter-spacing: 0.06em;
      }

      .card span {
        color: var(--muted);
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>音乐剧歌词合集</h1>
      <p class="intro">为音乐剧歌词学习整理的阅读、对照与发音页面。</p>

      <section class="collection" aria-label="音乐剧列表">
        <a class="card" href="dazhuangwang/">
          <strong>大状王</strong>
          <span>粤语歌词、粤拼对照与逐句朗读。</span>
        </a>
      </section>
    </main>
  </body>
</html>
