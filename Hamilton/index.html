<!doctype html>
<html lang="zh-CN">
  <head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-E49LJ5T1V6"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-E49LJ5T1V6');
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preload" href="lyrics-data.js" as="script" />
    <link rel="preload" href="word-data.js" as="script" fetchpriority="low" />
    <title>Hamilton 中英歌词</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <canvas id="effectCanvas" aria-hidden="true"></canvas>

    <div class="app-shell">
      <aside class="song-sidebar" aria-label="歌曲列表">
        <div class="sidebar-top">
          <button class="sidebar-toggle" id="sidebarToggle" type="button" aria-label="收起歌曲列表" aria-expanded="true">‹</button>
          <div class="sidebar-title">
            <strong>Hamilton</strong>
            <span>歌曲列表</span>
          </div>
        </div>
        <nav class="song-list" id="songList"></nav>
      </aside>

      <main class="content">
        <header class="hero">
          <div class="hero-copy">
            <p class="musical-name">Hamilton</p>
            <div class="song-title-row">
              <h1 id="songTitle">Hamilton 中英歌词</h1>
              <button class="song-play-button" id="songPlayButton" type="button" aria-label="连续播放本曲" aria-pressed="false" title="连续播放本曲">
                <svg viewBox="0 0 28 24" aria-hidden="true">
                  <path class="playlist-play-mark" d="M3.5 5.2v13.6l10-6.8z" />
                  <path class="playlist-lines-mark" d="M16.5 6h8M16.5 12h8M16.5 18h8" />
                  <rect class="playlist-stop-mark" x="8" y="6" width="12" height="12" rx="1.5" />
                </svg>
              </button>
            </div>
            <div class="toolbar" aria-label="显示设置">
              <button class="toggle is-active" type="button" data-toggle="showZh" aria-pressed="true">中文</button>
              <button class="toggle is-active" type="button" data-toggle="showIpa" aria-pressed="true">音标</button>
              <button class="toggle feedback-button" id="feedbackButton" type="button">反馈</button>
            </div>
          </div>
          <img class="hero-mark" src="assets/Hamilton-Logo-1.svg" alt="Hamilton Logo" />
        </header>

        <label class="mobile-picker" for="songSelect">
          <span>选择歌曲</span>
          <select id="songSelect"></select>
        </label>

        <section class="lyrics" id="lyrics" aria-label="歌词"></section>
      </main>
    </div>

    <aside class="word-popover" id="wordPopover" hidden></aside>
    <button class="back-to-top" id="backToTop" type="button" aria-label="返回顶部" hidden>↑</button>

    <script src="lyrics-data.js"></script>
    <script src="../shared/audio-playback.js"></script>
    <script src="script.js"></script>
    <script src="../shared/feedback-widget.js"></script>
    <script>
      window.MusicalFeedback.mount({
        id: "hamilton",
        siteName: "Hamilton 中英歌词",
        recipient: "fulife@agent.qq.com",
        trigger: "#feedbackButton",
        songs: [...new Map((window.hamiltonLyricsRows || []).map((row) => [
          row.song_id,
          { value: row.song_id, label: `${row.song_order}. ${row.song_title}` },
        ])).values()],
        getCurrentSongId: () => (typeof getCurrentSong === "function" ? getCurrentSong()?.id : undefined),
      });
    </script>
  </body>
</html>
