<!doctype html>
<html lang="zh-CN">
  <head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-E49LJ5T1V6"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-E49LJ5T1V6');
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preload" href="songs.js" as="script" />
    <title>Le Rouge et le Noir</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <canvas class="rouge-cursor" id="rougeCursor" aria-hidden="true" hidden></canvas>

    <div class="stage-shell">
      <header class="topbar">
        <div class="musical-title-line">
          <p class="app-kicker">Le Rouge et le Noir, l'Opéra Rock</p>
          <span class="reference-note">内容仅供参考</span>
        </div>
        <div class="topbar-tools">
          <section class="controls" aria-label="显示设置">
            <button class="toggle is-active" type="button" data-toggle="showZh" aria-pressed="true">
              中文
            </button>
            <button class="toggle" type="button" data-toggle="showEn" aria-pressed="false">
              English
            </button>
            <button class="toggle" type="button" data-toggle="showAnalysis" aria-pressed="false">
              解析
            </button>
            <button class="toggle" type="button" data-toggle="showPhonetics" aria-pressed="false">
              音标
            </button>
            <button class="toggle feedback-button" id="feedbackButton" type="button">
              反馈
            </button>
          </section>
        </div>
      </header>

      <div class="app-layout">
        <aside class="song-sidebar" aria-label="歌曲导航">
          <div class="sidebar-section">
            <div class="sidebar-heading">
              <h2>歌曲列表</h2>
              <button class="sidebar-toggle sidebar-toggle-compact" type="button" data-sidebar-toggle aria-expanded="true">
                收起
              </button>
            </div>
            <nav class="song-nav" id="songNav"></nav>
          </div>
        </aside>

        <main class="content-shell">
          <label class="mobile-song-picker" for="songSelect">
            <span>选择歌曲</span>
            <select id="songSelect"></select>
          </label>

          <header class="hero">
            <div class="hero-copy">
              <div class="song-title-row">
                <h1 id="currentSongTitle"></h1>
                <button class="song-play-button" id="songPlayButton" type="button" aria-label="连续播放本曲" aria-pressed="false" title="连续播放本曲">
                  <svg viewBox="0 0 28 24" aria-hidden="true">
                    <path class="playlist-play-mark" d="M3.5 5.2v13.6l10-6.8z" />
                    <path class="playlist-lines-mark" d="M16.5 6h8M16.5 12h8M16.5 18h8" />
                    <rect class="playlist-stop-mark" x="8" y="6" width="12" height="12" rx="1.5" />
                  </svg>
                </button>
              </div>
              <p class="title-translation" id="currentSongZhTitle"></p>
              <p class="story-position" id="storyPosition"></p>
            </div>
          </header>

          <div class="main-grid">
            <section class="lyrics-column" aria-label="歌词列表">
              <div class="list-status" id="listStatus"></div>
              <div class="lyrics-list" id="lyricsList"></div>
            </section>
          </div>
        </main>
      </div>
    </div>

    <button class="back-to-top" id="backToTop" type="button" aria-label="返回顶部" hidden>
      ↑
    </button>

    <script src="songs.js"></script>
    <script src="../shared/audio-playback.js"></script>
    <script src="script.js"></script>
    <script src="../shared/feedback-widget.js"></script>
    <script>
      window.MusicalFeedback.mount({
        id: "rouge-et-noir",
        siteName: "摇滚红与黑歌词学习",
        recipient: "fulife@agent.qq.com",
        trigger: "#feedbackButton",
        songs: (window.songs || []).map((song) => ({
          value: song.id,
          label: `${song.order}. ${song.title}`,
        })),
        getCurrentSongId: () => (typeof getCurrentSong === "function" ? getCurrentSong()?.id : undefined),
      });
    </script>
  </body>
</html>
